<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* ==========================================================================
           1. RESET Y CAPAS DE FONDO
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b2e4b; /* Fondo oscuro de respaldo */
            overflow-x: hidden;
            color: #1b2e4b;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #e2e5e9;
            background-image: url('fondofondo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        /* ==========================================================================
           2. ESTRELLAS DESTELLANTES (Puntas largas y mimetización corregida)
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 4s infinite ease-in-out;
            mix-blend-mode: difference; /* Para que resalten sobre el fondo claro */
        }

        /* Posiciones aleatorias de las 18 estrellas */
        .sparkle:nth-child(1)  { top: 7%;   left: 15%;  animation-delay: 0.0s; width: 35px; height: 35px; }
        .sparkle:nth-child(2)  { top: 28%;  left: 82%;  animation-delay: 1.5s; width: 25px; height: 25px; }
        .sparkle:nth-child(3)  { top: 45%;  left: 8%;   animation-delay: 0.7s; width: 45px; height: 45px; }
        .sparkle:nth-child(4)  { top: 68%;  left: 88%;  animation-delay: 2.2s; width: 30px; height: 30px; }
        .sparkle:nth-child(5)  { top: 18%;  left: 62%;  animation-delay: 3.1s; width: 22px; height: 22px; }
        .sparkle:nth-child(6)  { top: 88%;  left: 18%;  animation-delay: 1.1s; width: 38px; height: 38px; }
        .sparkle:nth-child(7)  { top: 35%;  left: 42%;  animation-delay: 2.6s; width: 28px; height: 28px; }
        .sparkle:nth-child(8)  { top: 58%;  left: 74%;  animation-delay: 0.4s; width: 32px; height: 32px; }
        .sparkle:nth-child(9)  { top: 22%;  left: 12%;  animation-delay: 1.9s; width: 26px; height: 26px; }
        .sparkle:nth-child(10) { top: 78%;  left: 48%;  animation-delay: 0.2s; width: 40px; height: 40px; }
        .sparkle:nth-child(11) { top: 5%;   left: 70%;  animation-delay: 3.4s; width: 24px; height: 24px; }
        .sparkle:nth-child(12) { top: 52%;  left: 92%;  animation-delay: 1.3s; width: 34px; height: 34px; }
        .sparkle:nth-child(13) { top: 92%;  left: 68%;  animation-delay: 2.8s; width: 28px; height: 28px; }
        .sparkle:nth-child(14) { top: 40%;  left: 25%;  animation-delay: 0.5s; width: 32px; height: 32px; }
        .sparkle:nth-child(15) { top: 64%;  left: 30%;  animation-delay: 1.7s; width: 22px; height: 22px; }
        .sparkle:nth-child(16) { top: 14%;  left: 40%;  animation-delay: 2.9s; width: 36px; height: 36px; }
        .sparkle:nth-child(17) { top: 74%;  left: 5%;   animation-delay: 0.8s; width: 28px; height: 28px; }
        .sparkle:nth-child(18) { top: 84%;  left: 90%;  animation-delay: 2.1s; width: 42px; height: 42px; }

        @keyframes twinkle {
            0%, 100% { transform: rotate(45deg) scale(0); opacity: 0; }
            50% { transform: rotate(45deg) scale(2.2); opacity: 1; }
        }

        /* ==========================================================================
           3. ESTRUCTURA DE LA INVITACIÓN Y CENTRADO DE PORTADA
           ========================================================================== */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
        }

        .section-portada {
            padding-top: 60px;
            padding-bottom: 40px;
            overflow: hidden;
            width: 100%;
            min-height: 280px;
        }

        .disco-bg-top {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 380px;
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        /* Centrado simétrico de la portada (Desborda equitativamente y clava la "H" al medio) */
        .portada-img {
            width: 135%; 
            max-width: none;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 10px rgba(27, 46, 75, 0.15));
            display: block;
            left: 50%;
            transform: translateX(-51.5%); 
        }

        .disco-decor {
            position: absolute;
            width: 60%;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .disco-left { left: -20%; top: 25%; }
        .disco-right { right: -20%; top: 65%; }

        .texto-svg {
            width: 100%;
            max-width: 340px;
            height: auto;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
            display: block;
        }

        .divider-star {
            width: 28px;
            height: auto;
            margin: 20px 0;
            opacity: 0.85;
            position: relative;
            z-index: 2;
            animation: pulse-star 3s infinite ease-in-out;
        }

        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .btn-capsule {
            display: inline-block;
            width: 85%;
            max-width: 290px;
            padding: 15px 24px;
            background-color: #1b2e4b;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1.5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 20px rgba(27, 46, 75, 0.35), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 3;
            margin-bottom: 15px;
        }

        .btn-capsule:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(27, 46, 75, 0.4);
            background-color: #122036;
        }

        .btn-copied {
            background-color: #2c4a3e !important;
            box-shadow: 0 6px 20px rgba(44, 74, 62, 0.3) !important;
        }
    </style>
</head>
<body>

    <!-- Capa de fondo fija -->
    <div class="bg-container"></div>

    <!-- Capa de estrellas -->
    <div class="sparkle-overlay">
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    </div>

    <div class="main-wrapper">

        <!-- SECCIÓN 1 -->
        <section class="section-portada">
            <img src="DiscoB.svg" class="disco-bg-top" alt="Decoración Disco">
            <img src="15%20portada.svg" class="portada-img" alt="Mis XV Franchu">
        </section>

        <img src="DiscoB.svg" class="disco-decor disco-left" alt="Decoración">
        <img src="DiscoB.svg" class="disco-decor disco-right" alt="Decoración">

        <!-- SECCIÓN 2 -->
        <section>
            <img src="Texto%20Fecha%20y%20Lugar.svg" class="texto-svg" alt="Fecha y Lugar">
            <a href="https://maps.google.com" target="_blank" class="btn-capsule">Cómo Llegar</a>
        </section>

        <!-- SECCIÓN 3 -->
        <section>
            <img src="Texto%20Confirmar.svg" class="texto-svg" alt="Confirmar">
            <a href="https://api.whatsapp.com/send?phone=543874411122&text=CONFIRMO%20ASISTENCIA%2015%20FRANCHU" target="_blank" class="btn-capsule">Confirmar Asistencia</a>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <!-- SECCIÓN 4 -->
        <section>
            <img src="Texto%20DressCode.svg" class="texto-svg" alt="Dress Code">
        </section>

        <!-- SECCIÓN 5 -->
        <section>
            <img src="Texto%20Regalo.svg" class="texto-svg" alt="Regalo">
            <button id="btn-alias" class="btn-capsule" onclick="copiarAlias()">Regalo / Copiar Alias</button>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <!-- SECCIÓN 6 -->
        <section style="padding-bottom: 40px;">
            <img src="Texto%20Final.svg" class="texto-svg" alt="Final">
        </section>

    </div>

    <script>
        function copiarAlias() {
            const aliasTexto = "alias.prueba";
            const boton = document.getElementById("btn-alias");
            
            navigator.clipboard.writeText(aliasTexto).then(() => {
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            }).catch(err => {
                const el = document.createElement('textarea');
                el.value = aliasTexto;
                el.setAttribute('readonly', '');
                el.style.position = 'absolute';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            });
        }
    </script>
</body>
</html>
