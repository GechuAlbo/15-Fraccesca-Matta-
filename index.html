<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Importación de tipografía solicitada para la cuenta regresiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y CAPAS DE FONDO ESTÁTICO (CORREGIDO)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #e2e5e9; /* Cambiado a gris claro neutro para evitar pantallas azules */
            overflow-x: hidden;
            color: #1b2e4b;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url(fondofondo.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -5; /* Fondo absoluto */
            pointer-events: none;
        }

        /* ==========================================================================
           1B. CAPA DE DISCOS (Posiciones fijas seguras en las esquinas)
           ========================================================================== */
        .disco-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -4; 
            pointer-events: none;
            overflow: hidden;
        }

        .disco-static-bg {
            position: absolute;
            width: 45vw; 
            max-width: 200px;
            height: auto;
            opacity: 0.25; /* Visible y sutil */
        }
        
        /* Ubicaciones perimetrales para evitar que se junten en el centro */
        .disco-bg-1 { top: -5%; left: -12%; transform: rotate(-15deg); }
        .disco-bg-2 { top: 42%; right: -15%; transform: rotate(45deg); width: 48vw; }
        .disco-bg-3 { bottom: 22%; left: -15%; transform: rotate(120deg); width: 46vw; }
        .disco-bg-4 { bottom: -5%; right: -8%; transform: rotate(-60deg); }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS (CORREGIDA SIN MIX-BLEND-MODE)
           ========================================================================== */

            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index
