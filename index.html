<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Importación de tipografía para la cuenta regresiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y CONFIGURACIÓN DE CAPA BASE (Garantiza visibilidad)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background-color: #1b2e4b; /* Fondo azul oscuro nativo de seguridad */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: url('fondofondo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
            color: #ffffff;
            position: relative;
        }

        /* ==========================================================================
           1B. ESFERAS DISCO DE FONDO (Capa aislada baja)
           ========================================================================== */
        .disco-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Nivel bajo */
            pointer-events: none;
            overflow: hidden;
        }

        .disco-static-bg {
            position: absolute;
            width: 42vw; 
            max-width: 180px;
            height: auto;
            opacity: 0.25; 
        }
        
        .disco-bg-1 { top: -4%; left: -10%; transform: rotate(-15deg); }
        .disco-bg-2 { top: 42%; right: -12%; transform: rotate(45deg); width: 45vw; }
        .disco-bg-3 { bottom: 25%; left: -12%; transform: rotate(120deg); width: 44vw; }
        .disco-bg-4 { bottom: -4%; right: -6%; transform: rotate(-60deg); }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS (Capa aislada baja)
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2; /* Nivel bajo, sobre los discos */
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 3.8s infinite ease-in-out;
            opacity: 0;
        }

        /* Coordenadas seguras de destellos */
        .sparkle:nth-child(1)  { top: 4%;   left: 8%;   animation-delay: 0.0s; width: 24px; height: 24px; }
        .sparkle:nth-child(2)  { top: 7%;   left: 78%;  animation-delay: 1.2s; width: 18px; height: 18px; }
        .sparkle:nth-child(3)  { top: 12%;  left: 25%;  animation-delay: 0.5s; width: 28px; height: 28px; }
        .sparkle:nth-child(4)  { top: 15%;  left: 88%;  animation-delay: 2.0s; width: 20px; height: 20px; }
        .sparkle:nth-child(5)  { top: 19%;  left: 50%;  animation-delay: 0.8s; width: 26px; height: 26px; }
        .sparkle:nth-child(6)  { top: 22%;  left: 14%;  animation-delay: 2.7s; width: 16px; height: 16px; }
        .sparkle:nth-child(7)  { top: 25%;  left: 65%;  animation-delay: 1.5s; width: 30px; height: 30px; }
        .sparkle:nth-child(8)  { top: 29%;  left: 33%;  animation-delay: 3.1s; width: 18px; height: 18px; }
        .sparkle:nth-child(9)  { top: 32%;  left: 80%;  animation-delay: 0.3s; width: 22px; height: 22px; }
        .sparkle:nth-child(10) { top: 35%;  left: 12%;  animation-delay: 1.9s; width: 26px; height: 26px; }
        .sparkle:nth-child(11) { top: 38%;  left: 45%;  animation-delay: 2.4s; width: 20px; height: 20px; }
        .sparkle:nth-child(12) { top: 41%;  left: 88%;  animation-delay: 0.7s; width: 24px; height: 24px; }
        .sparkle:nth-child(13) { top: 44%;  left: 20%;  animation-delay: 1.6s; width: 28px; height: 28px; }
        .sparkle:nth-child(14) { top: 47%;  left: 60%;  animation-delay: 3.3s; width: 18px; height: 18px; }
        .sparkle:nth-child(15) { top: 50%;  left: 5%;   animation-delay: 0.2s; width: 22px; height: 22px; }
        .sparkle:nth-child(16) { top: 53%;  left: 76%;  animation-delay: 2.1s; width: 32px; height: 32px; }
        .sparkle:nth-child(17) { top: 56%;  left: 30%;  animation-delay: 1.1s; width: 16px; height: 16px; }
        .sparkle:nth-child(18) { top: 59%;  left: 92%;  animation-delay: 2.9s; width: 26px; height: 26px; }
        .sparkle:nth-child(19) { top: 62%;  left: 15%;  animation-delay: 0.4s; width: 20px; height: 20px; }
        .sparkle:nth-child(20) { top: 65%;  left: 52%;  animation-delay: 1.8s; width: 28px; height: 28px; }

        @keyframes twinkle {
            0%, 100% { transform: rotate(45deg) scale(0); opacity: 0; }
            50% { transform: rotate(45deg) scale(1.6); opacity: 0.85; }
        }

        /* ==========================================================================
           3. CONTENEDOR SUPREMO DE CONTENIDO (FRENTE ABSOLUTO OBLIGATORIO)
           ========================================================================== */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 9999 !important; /* Forzado al frente absoluto por encima de cualquier bug */
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 90px 24px; 
            position: relative;
            z-index: 9999;
        }

        .section-portada {
            padding-top: 80px; 
            padding-bottom: 15px;
            width: 100%;
            min-height: 400px; 
        }

        .disco-bg-top {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 380px;
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        .portada-img {
            width: 160%;
            max-width: none;
            height: auto;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
            display: block;
            margin-left: -9.7%; 
            left: 0;
        }

        /* ==========================================================================
           4. COMPONENTE: CUENTA REGRESIVA
           ========================================================================== */
        .section-countdown {
            padding-top: 50px;     
            padding-bottom: 100px; 
            font-family: 'Inter', sans-serif;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px; 
            width: 100%;
            max-width: 340px;
        }

        .countdown-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
        }

        .countdown-number {
            font-size: 34px;
            font-weight: 300; 
            letter-spacing: -0.5px;
            color: #ffffff; 
            line-height: 1;
        }

        .countdown-divider {
            font-size: 28px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            line-height: 1;
            align-self: center;
            margin-bottom: 14px; 
        }

        .countdown-label {
            font-size: 9px;
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 6px;
        }

        /* Ajustes de bloques informativos */
        .bloque-informacion {
            padding-top: 80px;    
            padding-bottom: 85px; 
        }

        .espacio-dos-renglones {
            margin-top: 140px; 
        }

        /* Estilos Ultra-Seguros para los gráficos SVG de texto */
        .texto-svg {
            display: block;
            width: 100%;
            max-width: 340px;
            height: auto;
            min-height: 40px; /* Evita colapsos a tamaño cero */
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .texto-regalo-svg {
            max-width: 365px; 
        }

        .divider-star {
            width: 28px;
            height: auto;
            min-height: 20px;
            margin: 40px 0; 
            opacity: 0.85;
            position: relative;
            z-index: 10;
            animation: pulse-star 3s infinite ease-in-out;
        }

        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        /* ==========================================================================
           5. BOTONES ELEGANTES ULTRA-VISIBLES
           ========================================================================== */
        .btn-capsule {
            display: inline-block;
            width: 85%;
            max-width: 290px;
            padding: 15px 24px;
            margin-top: 45px; 
            background-color: #ffffff; /* Blanco pleno */
            color: #1b2e4b; /* Texto azul oscuro */
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1.5px;
            border-radius: 50px;
            border: 1px solid #ffffff;
            box-shadow: 0 6px 22px rgba(0, 0, 0, 0.45);
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 99;
        }

        .btn-capsule:active {
            transform: scale(0.97);
            background-color: #e2e5e9;
        }

        .btn-copied {
            background-color: #2c4a3e !important;
            color: #ffffff !important;
            border-color: #2c4a3e !important;
            box-shadow: 0 6px 20px rgba(44, 74, 62, 0.4) !important;
        }
    </style>
</head>
<body>

    <div class="disco-background-layer">
        <img src="DiscoB.svg" class="disco-static-bg disco-bg-1" alt="">
        <img src="DiscoB.svg" class="disco-static-bg disco-bg-2" alt="">
        <img src="DiscoB.svg" class="disco-static-bg disco-bg-3" alt="">
        <img src="DiscoB.svg" class="disco-static-bg disco-bg-4" alt="">
    </div>

    <div class="sparkle-overlay">
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    </div>

    <div class="main-wrapper">

        <section class="section-portada">
            <img src="DiscoB.svg" class="disco-bg-top" alt="Decoración Disco">
            <img src="15%20portada.svg" class="portada-img" alt="Mis XV Franchu">
        </section>

        <section class="section-countdown">
            <div class="countdown-container">
                <div class="countdown-block">
                    <span id="days" class="countdown-number">00</span>
                    <span class="countdown-label">Días</span>
                </div>
                <div class="countdown-divider">:</div>
                <div class="countdown-block">
                    <span id="hours" class="countdown-number">00</span>
                    <span class="countdown-label">Hs</span>
                </div>
                <div class="countdown-divider">:</div>
                <div class="countdown-block">
                    <span id="minutes" class="countdown-number">00</span>
                    <span class="countdown-label">Min</span>
                </div>
                <div class="countdown-divider">:</div>
                <div class="countdown-block">
                    <span id="seconds" class="countdown-number">00</span>
                    <span class="countdown-label">Seg</span>
                </div>
            </div>
        </section>

        <section>
            <img src="Texto%20Fecha%20y%20Lugar.svg" class="texto-svg" alt="Fecha y Lugar">
            <a href="https://maps.google.com" target="_blank" class="btn-capsule">Cómo Llegar</a>
        </section>

        <section>
            <img src="Texto%20Confirmar.svg" class="texto-svg" alt="Confirmar">
            <a href="https://api.whatsapp.com/send?phone=543874411122&text=CONFIRMO%20ASISTENCIA%2015%20FRANCHU" target="_blank" class="btn-capsule">Confirmar Asistencia</a>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <section class="bloque-informacion">
            <img src="Texto%20DressCode.svg" class="texto-svg" alt="Dress Code">
            <img src="Texto%20Regalo.svg?v=2" class="texto-svg texto-regalo-svg espacio-dos-renglones" alt="Regalo">
            <button id="btn-alias" class="btn-capsule" onclick="copiarAlias()">Regalo / Copiar
