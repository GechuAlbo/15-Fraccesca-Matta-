<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Importación de tipografía solicitada para la cuenta regresiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y FONDO BASE SEGURO (Evita pantallas blancas)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b2e4b; /* Fondo azul oscuro de seguridad permanente */
            background-image: url(fondofondo.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
            color: #ffffff; /* Textos en blanco para máximo contraste */
        }

        /* ==========================================================================
           1B. ESFERAS DISCO DE FONDO (Ubicaciones fijas en los bordes)
           ========================================================================== */
        .disco-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1; /* Por detrás del contenido principal */
            pointer-events: none;
            overflow: hidden;
        }

        .disco-static-bg {
            position: absolute;
            width: 42vw; 
            max-width: 180px;
            height: auto;
            opacity: 0.25; /* Opacidad equilibrada y visible */
        }
        
        /* Posiciones perimetrales que no obstruyen el centro */
        .disco-bg-1 { top: -4%; left: -10%; transform: rotate(-15deg); }
        .disco-bg-2 { top: 42%; right: -12%; transform: rotate(45deg); width: 45vw; }
        .disco-bg-3 { bottom: 25%; left: -12%; transform: rotate(120deg); width: 44vw; }
        .disco-bg-4 { bottom: -4%; right: -6%; transform: rotate(-60deg); }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS CONTRASTADAS
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2; 
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%,
