<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Importación de tipografía solicitada para la cuenta regresiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y CAPAS DE FONDO
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b2e4b;
            overflow-x: hidden;
            color: #1b2e4b;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #e2e5e9;
            background-image: url(fondofondo.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS (Intensificadas en zona alta y media)
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 3.8s infinite ease-in-out;
            mix-blend-mode: difference;
        }

        /* Ráfaga de destellos: Zona Portada */
        .sparkle:nth-child(1)  { top: 4%;   left: 8%;   animation-delay: 0.0s; width: 32px; height: 32px; }
        .sparkle:nth-child(2)  { top: 7%;   left: 78%;  animation-delay: 1.2s; width: 24px; height: 24px; }
        .sparkle:nth-child(3)  { top: 12%;  left: 25%;  animation-delay: 0.5s; width: 38px; height: 38px; }
        .sparkle:nth-child(4)  { top: 15%;  left: 88%;  animation-delay: 2.0s; width: 28px; height: 28px; }
        .sparkle:nth-child(5)  { top: 19%;  left: 50%;  animation-delay: 0.8s; width: 35px; height: 35px; }
        .sparkle:nth-child(6)  { top: 22%;  left: 14%;  animation-delay: 2.7s; width: 22px; height: 22px; }
        .sparkle:nth-child(7)  { top: 25%;  left: 65%;  animation-delay: 1.5s; width: 42px; height: 42px; }
        .sparkle:nth-child(8)  { top: 29%;  left: 33%;  animation-delay: 3.1s; width: 26px; height: 26px; }
        .sparkle:nth-child(9)  { top: 32%;  left: 80%;  animation-delay: 0.3s; width: 30px; height: 30px; }
        .sparkle:nth-child(10) { top: 35%;  left: 12%;  animation-delay: 1.9s; width: 36px; height: 36px; }

        /* Ráfaga de destellos: Zona Media / Fecha y Confirmación */
        .sparkle:nth-child(11) { top: 38%;  left: 45%;  animation-delay: 2.4s; width: 28px; height: 28px; }
        .sparkle:nth-child(12) { top: 41%;  left: 88%;  animation-delay: 0.7s; width: 34px; height: 34px; }
        .sparkle:nth-child(13) { top: 44%;  left: 20%;  animation-delay: 1.6s; width: 40px; height: 40px; }
        .sparkle:nth-child(14) { top: 47%;  left: 60%;  animation-delay: 3.3s; width: 25px; height: 25px; }
        .sparkle:nth-child(15) { top: 50%;  left: 5%;   animation-delay: 0.2s; width: 32px; height: 32px; }
        .sparkle:nth-child(16) { top: 53%;  left: 76%;  animation-delay: 2.1s; width: 45px; height: 45px; }
        .sparkle:nth-child(17) { top: 56%;  left: 30%;  animation-delay: 1.1s; width: 22px; height: 22px; }
        .sparkle:nth-child(18) { top: 59%;  left: 92%;  animation-delay: 2.9s; width: 36px; height: 36px; }
        .sparkle:nth-child(19) { top: 62%;  left: 15%;  animation-delay: 0.4s; width: 28px; height: 28px; }
        .sparkle:nth-child(20) { top: 65%;  left: 52%;  animation-delay: 1.8s; width: 38px; height: 38px; }

        /* Copias adicionales para densificar las zonas clave */
        .sparkle:nth-child(21) { top: 6%;   left: 40%;  animation-delay: 2.2s; width: 26px; height: 26px; }
        .sparkle:nth-child(22) { top: 11%;  left: 66%;  animation-delay: 0.9s; width: 32px; height: 32px; }
        .sparkle:nth-child(23) { top: 16%;  left: 12%;  animation-delay: 3.5s; width: 24px; height: 24px; }
        .sparkle:nth-child(24) { top: 24%;  left: 85%;  animation-delay: 1.4s; width: 35px; height: 35px; }
        .sparkle:nth-child(25) { top: 30%;  left: 55%;  animation-delay: 2.6s; width: 28px; height: 28px; }
        .sparkle:nth-child(26) { top: 37%;  left: 28%;  animation-delay: 0.1s; width: 33px; height: 33px; }
        .sparkle:nth-child(27) { top: 43%;  left: 72%;  animation-delay: 1.7s; width: 22px; height: 22px; }
        .sparkle:nth-child(28) { top: 49%;  left: 42%;  animation-delay: 3.0s; width: 36px; height: 36px; }
        .sparkle:nth-child(29) { top: 55%;  left: 84%;  animation-delay: 0.6s; width: 30px; height: 30px; }
        .sparkle:nth-child(30) { top: 61%;  left: 68%;  animation-delay: 2.3s; width: 25px; height: 25px; }

        /* Zona Inferior */
        .sparkle:nth-child(31) { top: 70%;  left: 28%;  animation-delay: 1.3s; width: 26px; height: 26px; }
        .sparkle:nth-child(32) { top: 75%;  left: 82%;  animation-delay: 3.2s; width: 34px; height: 34px; }
        .sparkle:nth-child(33) { top: 80%;  left: 8%;   animation-delay: 0.5s; width: 22px; height: 22px; }
        .sparkle:nth-child(34) { top: 85%;  left: 64%;  animation-delay: 2.5s; width: 38px; height: 38px; }
        .sparkle:nth-child(35) { top: 90%;  left: 40%;  animation-delay: 1.1s; width: 28px; height: 28px; }
        .sparkle:nth-child(36) { top: 94%;  left: 86%;  animation-delay: 2.8s; width: 35px; height: 35px; }

        @keyframes twinkle {
            0%, 100% { transform: rotate(45deg) scale(0); opacity: 0; }
            50% { transform: rotate(45deg) scale(2.2); opacity: 1; }
        }

        /* ==========================================================================
           3. ESTRUCTURA DE LA INVITACIÓN Y COMPRESIÓN DE ESPACIOS
           ========================================================================== */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 30px 24px;
            position: relative;
        }

        .section-portada {
            padding-top: 40px;
            padding-bottom: 15px;
            overflow: hidden;
            width: 100%;
            min-height: 380px;
        }

        .disco-bg-top {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 380px;
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        /* Ajustado exactamente a -9.7% para clavar el píxel extra solicitado a la derecha */
        .portada-img {
            width: 160%;
            max-width: none;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 12px rgba(27, 46, 75, 0.18));
            display: block;
            margin-left: -9.7%; 
            left: 0;
            transform: none;
        }

        /* ==========================================================================
           4. COMPONENTE: CUENTA REGRESIVA (Tipografía Inter)
           ========================================================================== */
        .section-countdown {
            padding-top: 10px;
            padding-bottom: 25px;
            font-family: 'Inter', sans-serif;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            width: 100%;
            max-width: 340px;
        }

        .countdown-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .countdown-number {
            font-size: 36px;
            font-weight: 300; /* Light weight para un look sofisticado */
            letter-spacing: -0.5px;
            color: #1b2e4b;
            line-height: 1;
            margin-bottom: 4px;
        }

        .countdown-label {
            font-size: 10px;
            font-weight: 600; /* Semi-bold para legibilidad en textos chicos */
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(27, 46, 75, 0.6);
        }

        /* Bloque unificado para control tipográfico de 2 renglones */
        .bloque-informacion {
            padding-top: 20px;
            padding-bottom: 25px;
        }

        .espacio-dos-renglones {
            margin-top: 2.5em; 
        }

        .disco-decor {
            position: absolute;
            width: 60%;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .disco-left { left: -20%; top: 25%; }
        .disco-right { right: -20%; top: 65%; }

        .texto-svg {
            width: 100%;
            max-width: 340px;
            height: auto;
            margin-bottom: 22px;
            position: relative;
            z-index: 2;
            display: block;
        }

        /* Aumento del recurso de Regalo */
        .texto-regalo-svg {
            max-width: 365px; 
        }

        .divider-star {
            width: 28px;
            height: auto;
            margin: 15px 0;
            opacity: 0.85;
            position: relative;
            z-index: 2;
            animation: pulse-star 3s infinite ease-in-out;
        }

        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .btn-capsule {
            display: inline-block;
            width: 85%;
            max-width: 290px;
            padding: 15px 24px;
            background-color: #1b2e4b;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1.5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 20px rgba(27, 46, 75, 0.35), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 3;
            margin-bottom: 10px;
        }

        .btn-capsule:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(27, 46, 75, 0.4);
            background-color: #122036;
        }

        .btn-copied {
            background-color: #2c4a3e !important;
            box-shadow: 0 6px 20px rgba(44, 74, 62, 0.3) !important;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="sparkle-overlay">
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
        <div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
    </div>

    <div class="main-wrapper">

        <section class="section-portada">
            <img src="DiscoB.svg" class="disco-bg-top" alt="Decoración Disco">
            <img src="15%20portada.svg" class="portada-img" alt="Mis XV Franchu">
        </section>

        <section class="section-countdown">
            <div class="countdown-container">
                <div class="countdown-block">
                    <span id="days" class="countdown-number">00</span>
                    <span class="countdown-label">Días</span>
                </div>
                <div class="countdown-block">
                    <span id="hours" class="countdown-number">00</span>
                    <span class="countdown-label">Hs</span>
                </div>
                <div class="countdown-block">
                    <span id="minutes" class="countdown-number">00</span>
                    <span class="countdown-label">Min</span>
                </div>
                <div class="countdown-block">
                    <span id="seconds" class="countdown-number">00</span>
                    <span class="countdown-label">Seg</span>
                </div>
            </div>
        </section>

        <img src="DiscoB.svg" class="disco-decor disco-left" alt="Decoración">
        <img src="DiscoB.svg" class="disco-decor disco-right" alt="Decoración">

        <section>
            <img src="Texto%20Fecha%20y%20Lugar.svg" class="texto-svg" alt="Fecha y Lugar">
            <a href="https://maps.google.com" target="_blank" class="btn-capsule">Cómo Llegar</a>
        </section>

        <section>
            <img src="Texto%20Confirmar.svg" class="texto-svg" alt="Confirmar">
            <a href="https://api.whatsapp.com/send?phone=543874411122&text=CONFIRMO%20ASISTENCIA%2015%20FRANCHU" target="_blank" class="btn-capsule">Confirmar Asistencia</a>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <section class="bloque-informacion">
            <img src="Texto%20DressCode.svg" class="texto-svg" alt="Dress Code" style="margin-bottom: 0;">
            <img src="Texto%20Regalo.svg" class="texto-svg texto-regalo-svg espacio-dos-renglones" alt="Regalo">
            <button id="btn-alias" class="btn-capsule" onclick="copiarAlias()">Regalo / Copiar Alias</button>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <section style="padding-bottom: 40px;">
            <img src="Texto%20Final.svg" class="texto-svg" alt="Final">
        </section>

    </div>

    <script>
        /* LÓGICA DE LA CUENTA REGRESIVA: Configurada para el 15 de Agosto a las 21:00 hs */
        function iniciarCuentaRegresiva() {
            // Fecha objetivo en milisegundos (Año actual dinámico o fijo según se requiera, seteado para el evento)
            const fechaObjetivo = new Date("August 15, 2026 21:00:00").getTime();

            const intervalo = setInterval(function() {
                const ahora = new Date().getTime();
                const distancia = fechaObjetivo - ahora;

                // Cálculos de tiempo para días, horas, minutos y segundos
                const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
                const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
                const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

                // Render en el HTML asegurando el formato clásico de dos dígitos (00)
                document.getElementById("days").innerText = dias < 10 ? "0" + dias : dias;
                document.getElementById("hours").innerText = horas < 10 ? "0" + horas : horas;
                document.getElementById("minutes").innerText = minutos < 10 ? "0" + minutos : minutos;
                document.getElementById("seconds").innerText = segundos < 10 ? "0" + segundos : segundos;

                // Si la cuenta regresiva llega a cero, frena el contador y limpia los campos
                if (distancia < 0) {
                    clearInterval(intervalo);
                    document.getElementById("days").innerText = "00";
                    document.getElementById("hours").innerText = "00";
                    document.getElementById("minutes").innerText = "00";
                    document.getElementById("seconds").innerText = "00";
                }
            }, 1000);
        }

        // Ejecutar contador inmediatamente al cargar la web
        iniciarCuentaRegresiva();

        function copiarAlias() {
            const aliasTexto = "alias.prueba";
            const boton = document.getElementById("btn-alias");
            
            navigator.clipboard.writeText(aliasTexto).then(() => {
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            }).catch(err => {
                const el = document.createElement('textarea');
                el.value = aliasTexto;
                el.setAttribute('readonly', '');
                el.style.position = 'absolute';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            });
        }
    </script>
</body>
</html>
