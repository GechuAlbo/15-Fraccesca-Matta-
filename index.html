<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Reset y Estilos Base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            overflow-x: hidden;
            color: #1b2e4b;
        }

        /* Contenedor del Nuevo Fondo Fijo */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #e2e5e9;
            background-image: url('fondo 1.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            pointer-events: none;
        }

        /* Capa de Estrellas Animadas (Destellos en 45° simulando loop de video) */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(255, 255, 255, 0.9);
            clip-path: polygon(50% 0%, 63% 37%, 100% 50%, 63% 63%, 50% 100%, 37% 63%, 0% 50%, 37% 37%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 4s infinite ease-in-out;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Tiempos y tamaños alternados para el efecto loop */
        .sparkle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; width: 18px; height: 18px; }
        .sparkle:nth-child(2) { top: 35%; left: 75%; animation-delay: 1.5s; width: 14px; height: 14px; }
        .sparkle:nth-child(3) { top: 55%; left: 15%; animation-delay: 0.8s; width: 22px; height: 22px; }
        .sparkle:nth-child(4) { top: 75%; left: 80%; animation-delay: 2.3s; width: 16px; height: 16px; }
        .sparkle:nth-child(5) { top: 25%; left: 60%; animation-delay: 3.1s; width: 12px; height: 12px; }
        .sparkle:nth-child(6) { top: 85%; left: 30%; animation-delay: 1.2s; width: 20px; height: 20px; }
        .sparkle:nth-child(7) { top: 45%; left: 45%; animation-delay: 2.7s; width: 15px; height: 15px; }
        .sparkle:nth-child(8) { top: 65%; left: 65%; animation-delay: 0.4s; width: 18px; height: 18px; }

        @keyframes twinkle {
            0%, 100% { transform: rotate(45deg) scale(0); opacity: 0; }
            50% { transform: rotate(45deg) scale(1); opacity: 1; filter: drop-shadow(0 0 6px #fff); }
        }

        /* Estructura de la Invitación Móvil */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 24px;
            position: relative;
        }

        .section-portada {
            padding-top: 60px;
            padding-bottom: 40px;
            overflow: hidden;
            width: 100%;
        }

        .disco-bg-top {
            position: absolute;
            top: 20px;
            width: 90%;
            max-width: 380px;
            opacity: 0.25;
            z-index: 1;
            pointer-events: none;
        }

        .portada-img {
            width: 118%;
            max-width: none;
            margin-left: -9%;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 10px rgba(27, 46, 75, 0.15));
        }

        .disco-decor {
            position: absolute;
            width: 60%;
            opacity: 0.12;
            pointer-events: none;
            z-index: 0;
        }
        .disco-left { left: -20%; top: 25%; }
        .disco-right { right: -20%; top: 65%; }

        .texto-svg {
            width: 100%;
            max-width: 340px;
            height: auto;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }

        .divider-star {
            width: 28px;
            height: auto;
            margin: 20px 0;
            opacity: 0.85;
            position: relative;
            z-index: 2;
            animation: pulse-star 3s infinite ease-in-out;
        }

        @keyframes pulse-star {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .btn-capsule {
            display: inline-block;
            width: 85%;
            max-width: 290px;
            padding: 15px 24px;
            background-color: #1b2e4b;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1.5px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 6px 20px rgba(27, 46, 75, 0.35), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            z-index: 3;
            margin-bottom: 15px;
        }

        .btn-capsule:active {
            transform: scale(0.97);
            box-shadow: 0 3px 10px rgba(27, 46, 75, 0.4);
            background-color: #122036;
        }

        .btn-copied {
            background-color: #2c4a3e !important;
            box-shadow: 0 6px 20px rgba(44, 74, 62, 0.3) !important;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="sparkle-overlay">
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
        <div class="sparkle"></div>
    </div>

    <div class="main-wrapper">

        <!-- SECCIÓN 1 -->
        <section class="section-portada">
            <img src="DiscoB.svg" class="disco-bg-top" alt="Decoración Disco">
            <img src="15%20portada.svg" class="portada-img" alt="Mis XV Franchu">
        </section>

        <img src="DiscoB.svg" class="disco-decor disco-left" alt="Decoración">
        <img src="DiscoB.svg" class="disco-decor disco-right" alt="Decoración">

        <!-- SECCIÓN 2 -->
        <section>
            <img src="Texto%20Fecha%20y%20Lugar.svg" class="texto-svg" alt="Fecha y Lugar">
            <a href="https://maps.app.goo.gl/zAip8KaJCdqkeMkL6" target="_blank" class="btn-capsule">Cómo Llegar</a>
        </section>

        <!-- SECCIÓN 3 -->
        <section>
            <img src="Texto%20Confirmar.svg" class="texto-svg" alt="Confirmar">
            <a href="https://api.whatsapp.com/send?phone=543874411122&text=CONFIRMO%20ASISTENCIA%2015%20FRANCHU" target="_blank" class="btn-capsule">Confirmar Asistencia</a>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <!-- SECCIÓN 4 -->
        <section>
            <img src="Texto%20DressCode.svg" class="texto-svg" alt="Dress Code">
        </section>

        <!-- SECCIÓN 5 -->
        <section>
            <img src="Texto%20Regalo.svg" class="texto-svg" alt="Regalo">
            <button id="btn-alias" class="btn-capsule" onclick="copiarAlias()">Regalo / Copiar Alias</button>
        </section>

        <img src="Estrella%20grande.svg" class="divider-star" alt="Estrella">

        <!-- SECCIÓN 6 -->
        <section style="padding-bottom: 40px;">
            <img src="Texto%20Final.svg" class="texto-svg" alt="Final">
        </section>

    </div>

    <script>
        function copiarAlias() {
            const aliasTexto = "alias.prueba";
            const boton = document.getElementById("btn-alias");
            
            navigator.clipboard.writeText(aliasTexto).then(() => {
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            }).catch(err => {
                const el = document.createElement('textarea');
                el.value = aliasTexto;
                el.setAttribute('readonly', '');
                el.style.position = 'absolute';
                el.style.left = '-9999px';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                const textoOriginal = boton.innerText;
                boton.innerText = "¡Alias Copiado!";
                boton.classList.add("btn-copied");
                setTimeout(() => {
                    boton.innerText = textoOriginal;
                    boton.classList.remove("btn-copied");
                }, 2500);
            });
        }
    </script>
</body>
</html>
