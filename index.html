        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y CAPAS DE FONDO ESTÁTICO
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b2e4b;
            overflow-x: hidden;
            color: #1b2e4b;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #e2e5e9;
            background-image: url(fondofondo.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -4;
            pointer-events: none;
        }

        /* ==========================================================================
           1B. NUEVA CAPA UNIFICADA PARA DISCOS (Garantiza visibilidad en móviles)
           ========================================================================== */
        .disco-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3;
            pointer-events: none;
            overflow: hidden;
        }

        .disco-static-bg {
            position: absolute;
            width: 65vw;
            max-width: 400px;
            height: auto;
            opacity: 0.12;
        }
        
        .disco-bg-1 { top: -8%; left: -20%; transform: rotate(-15deg); }
        .disco-bg-2 { top: 38%; right: -25%; transform: rotate(45deg); width: 75vw; }
        .disco-bg-3 { bottom: 20%; left: -30%; transform: rotate(120deg); width: 70vw; }
        .disco-bg-4 { bottom: -8%; right: -15%; transform: rotate(-60deg); }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 3.8s infinite ease-in-out;
            mix-blend-mode: difference;
        }
