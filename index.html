<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Franchu</title>
    <style>
        /* Importación de tipografía solicitada para la cuenta regresiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        /* ==========================================================================
           1. RESET Y CAPAS DE FONDO ESTÁTICO
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1b2e4b;
            overflow-x: hidden;
            color: #1b2e4b;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #e2e5e9;
            background-image: url(fondofondo.jpg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -4;
            pointer-events: none;
        }

        /* ==========================================================================
           1B. CAPA UNIFICADA PARA DISCOS (Opacidad aumentada)
           ========================================================================== */
        .disco-background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3; /* Por encima del fondo general, por debajo de las estrellas */
            pointer-events: none;
            overflow: hidden;
        }

        .disco-static-bg {
            position: absolute;
            width: 65vw;
            max-width: 400px;
            height: auto;
            opacity: 0.35; /* Incrementado al 35% para asegurar su total visibilidad */
        }
        
        /* Distribución orgánica por los bordes de la pantalla */
        .disco-bg-1 { top: -8%; left: -20%; transform: rotate(-15deg); }
        .disco-bg-2 { top: 38%; right: -25%; transform: rotate(45deg); width: 75vw; }
        .disco-bg-3 { bottom: 20%; left: -30%; transform: rotate(120deg); width: 70vw; }
        .disco-bg-4 { bottom: -8%; right: -15%; transform: rotate(-60deg); }

        /* ==========================================================================
           2. CONSTELACIÓN DE ESTRELLAS
           ========================================================================== */
        .sparkle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .sparkle {
            position: absolute;
            background: #ffffff;
            clip-path: polygon(50% 0%, 53% 47%, 100% 50%, 53% 53%, 50% 100%, 47% 53%, 0% 50%, 47% 47%);
            transform: rotate(45deg) scale(0);
            animation: twinkle 3.8s infinite ease-in-out;
            mix-blend-mode: difference;
        }

        /* Ráfaga de destellos: Zona Portada */
        .sparkle:nth-child(1)  { top: 4%;   left: 8%;   animation-delay: 0.0s; width: 32px; height: 32px; }
        .sparkle:nth-child(2)  { top: 7%;   left: 78%;  animation-delay: 1.2s; width: 24px; height: 24px; }
